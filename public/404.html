<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada — Nath Monari</title>
    <link rel="icon" type="image/webp" href="images/favicon.webp" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .erro{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--off-white);gap:20px;padding:24px}
      .erro-num{font-family:var(--font-display);font-size:96px;color:var(--ouro);line-height:1}
      .erro h1{font-family:var(--font-display);font-size:clamp(24px,3vw,34px);color:var(--preto);font-weight:400}
      .erro p{font-size:15px;color:var(--texto-sec)}
    </style>
  </head>
  <body>
    <div class="erro">
      <span class="erro-num">404</span>
      <h1>Página não encontrada</h1>
      <p>O endereço não existe ou foi movido.</p>
      <a href="/" class="btn-cta">Voltar ao início</a>
    </div>
  </body>
</html>
